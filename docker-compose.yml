services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genesis-postgres
    environment:
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis
      POSTGRES_DB: genesis
    ports:
      - "5432:5432"
    volumes:
      - genesis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genesis-redis
    ports:
      - "6379:6379"
    volumes:
      - genesis-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  genesis-pgdata:
  genesis-redisdata:
